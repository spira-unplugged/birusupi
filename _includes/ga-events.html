{% if site.data.settings.google-ID and site.data.settings.google-ID != '' %}
<script>
document.addEventListener("DOMContentLoaded", function () {
  if (typeof gtag !== "function") return;

  var pageTitle = document.title;

  // Share button clicks (X, Facebook)
  document.querySelectorAll(".post-share .sharing-icons a").forEach(function (link) {
    link.addEventListener("click", function () {
      var method = "unknown";
      if (link.href.indexOf("x.com") !== -1) method = "x";
      else if (link.href.indexOf("facebook.com") !== -1) method = "facebook";
      gtag("event", "share", {
        method: method,
        content_type: "post",
        item_id: pageTitle
      });
    });
  });

  // Social icon clicks (header & footer)
  document.querySelectorAll(".menu-social a, .footer-social a").forEach(function (link) {
    link.addEventListener("click", function () {
      var location = link.closest(".footer-social") ? "footer" : "header";
      var platform = link.getAttribute("aria-label") || "unknown";
      gtag("event", "social_click", {
        platform: platform,
        link_location: location,
        link_url: link.href
      });
    });
  });

  // TOC link clicks
  document.querySelectorAll("#toc-list a").forEach(function (link) {
    link.addEventListener("click", function () {
      gtag("event", "toc_click", {
        heading_text: link.textContent.trim(),
        post_title: pageTitle
      });
    });
  });

  // Post navigation (next/previous)
  document.querySelectorAll(".post-navigation a").forEach(function (link) {
    link.addEventListener("click", function () {
      var direction = link.classList.contains("next-post") ? "next" : "previous";
      gtag("event", "post_navigate", {
        direction: direction,
        destination: link.textContent.trim()
      });
    });
  });

  // Tag clicks
  document.querySelectorAll(".post-tag-link").forEach(function (link) {
    link.addEventListener("click", function () {
      gtag("event", "tag_click", {
        tag_name: link.textContent.trim(),
        post_title: pageTitle
      });
    });
  });

  // Reading progress (25%, 50%, 75%, 100%)
  var article = document.querySelector(".post-body");
  if (article) {
    var fired = {};
    var thresholds = [25, 50, 75, 100];

    var checkProgress = function () {
      var rect = article.getBoundingClientRect();
      var articleTop = rect.top + window.scrollY;
      var articleHeight = rect.height;
      if (articleHeight === 0) return;

      var scrolled = window.scrollY + window.innerHeight - articleTop;
      var percent = Math.min(100, Math.max(0, (scrolled / articleHeight) * 100));

      thresholds.forEach(function (t) {
        if (percent >= t && !fired[t]) {
          fired[t] = true;
          gtag("event", "read_progress", {
            percent: t,
            post_title: pageTitle
          });
        }
      });
    };

    window.addEventListener("scroll", checkProgress, { passive: true });
    checkProgress();
  }
});
</script>
{% endif %}
