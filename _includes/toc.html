<details class="toc">
  <summary>目次</summary>
  <ul id="toc-list"></ul>
</details>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const toc = document.querySelector(".toc");
    const tocList = document.getElementById("toc-list");
    const container = document.querySelector(".post-body");
    if (!toc || !tocList || !container) return;

    const headings = Array.from(container.querySelectorAll("h2, h3"));
    if (!headings.length) {
      toc.hidden = true;
      return;
    }

    const tocItems = [];
    const visibleHeadings = new Set();
    const activationOffset = 112;

    const syncTocState = function () {
      if (window.matchMedia("(max-width: 960px)").matches) {
        toc.removeAttribute("open");
      }
    };

    const setActiveItem = function (id, shouldScrollIntoView) {
      let activeElement = null;

      tocItems.forEach(function (item) {
        const isActive = item.id === id;
        item.element.classList.toggle("is-active", isActive);
        if (isActive) {
          item.link.setAttribute("aria-current", "location");
          activeElement = item.element;
        } else {
          item.link.removeAttribute("aria-current");
        }
      });

      if (activeElement && shouldScrollIntoView) {
        activeElement.scrollIntoView({ block: "nearest" });
      }
    };

    const findItemByHash = function () {
      const hash = window.location.hash.replace(/^#/, "");
      if (!hash) return null;
      return tocItems.find(function (item) {
        return item.id === hash;
      });
    };

    const getFallbackActiveId = function () {
      const passed = tocItems.filter(function (item) {
        return item.heading.getBoundingClientRect().top <= activationOffset;
      });

      if (passed.length) {
        return passed[passed.length - 1].id;
      }

      return tocItems[0].id;
    };

    const getActiveId = function () {
      const hashItem = findItemByHash();
      if (hashItem) {
        const hashTop = hashItem.heading.getBoundingClientRect().top;
        if (hashTop >= 0 && hashTop <= window.innerHeight * 0.45) {
          return hashItem.id;
        }
      }

      const visibleItems = tocItems.filter(function (item) {
        return visibleHeadings.has(item.id);
      });

      if (visibleItems.length) {
        return visibleItems[visibleItems.length - 1].id;
      }

      return getFallbackActiveId();
    };

    const updateActiveItem = function (shouldScrollIntoView) {
      if (!tocItems.length) return;
      setActiveItem(getActiveId(), shouldScrollIntoView);
    };

    syncTocState();
    window.addEventListener("resize", function () {
      syncTocState();
      updateActiveItem(false);
    });

    headings.forEach(function (heading) {
      const text = heading.textContent;
      const existingId = heading.id;
      const id = existingId || text
        .toLowerCase()
        .trim()
        .replace(/[^\w\u3040-\u30ff\u3400-\u9fff-]+/g, "-")
        .replace(/^-+|-+$/g, "");

      if (!existingId) heading.id = id;

      const li = document.createElement("li");
      li.className = heading.tagName.toLowerCase();

      const a = document.createElement("a");
      a.href = `#${id}`;
      a.textContent = text;
      a.addEventListener("click", function () {
        setActiveItem(id, false);
      });

      li.appendChild(a);
      tocList.appendChild(li);
      tocItems.push({ id: id, element: li, link: a, heading: heading });
    });

    const observer = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          visibleHeadings.add(entry.target.id);
        } else {
          visibleHeadings.delete(entry.target.id);
        }
      });

      window.requestAnimationFrame(function () {
        updateActiveItem(true);
      });
    }, {
      rootMargin: "-" + activationOffset + "px 0px -55% 0px",
      threshold: [0, 1]
    });

    tocItems.forEach(function (item) {
      observer.observe(item.heading);
    });

    window.addEventListener("scroll", function () {
      window.requestAnimationFrame(function () {
        updateActiveItem(false);
      });
    }, { passive: true });

    window.addEventListener("hashchange", function () {
      const hashItem = findItemByHash();
      if (hashItem) {
        setActiveItem(hashItem.id, true);
        return;
      }

      updateActiveItem(false);
    });

    const initialHashItem = findItemByHash();
    if (initialHashItem) {
      setActiveItem(initialHashItem.id, false);
    } else {
      updateActiveItem(false);
    }
  });
</script>
