<footer class="footer">
  {% for item in site.data.settings.social %}
    <a href="{{ item.link }}" class="menu-link" target="_blank" rel="noopener">
      {% if item.icon == 'kofi' %}
        <span class="social-icon social-icon-kofi" aria-hidden="true"></span>
      {% else %}
        <i class="fa-brands fa-{{ item.icon }}" aria-hidden="true"></i>
      {% endif %}
    </a>
  {% endfor %}
  
  <div class="footer-description">
    <a href="{{ site.baseurl }}/">
      {{ site.title }} | {{ site.description }} by {{ site.author }}
    </a>
  </div>
</footer>
