<footer class="footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <a class="footer-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <p class="footer-copyright">© {{ site.time | date: "%Y" }} {{ site.title }}</p>
      <div class="footer-social" aria-label="Social links">
        {% for item in site.data.settings.social %}
          <a href="{{ item.link }}" class="footer-social-link" target="_blank" rel="noopener" aria-label="{% if item.link contains 'ko-fi.com' %}Ko-fi{% else %}{{ item.icon }}{% endif %}">
            {% if item.link contains 'ko-fi.com' %}
              <img src="{{ '/assets/img/kofi_symbol.svg' | relative_url }}" alt="Ko-fi" class="kofi-symbol">
            {% else %}
              {% assign icon_style = item.style | default: 'brands' %}
              <i class="fa-{{ icon_style }} fa-{{ item.icon }}" aria-hidden="true"></i>
            {% endif %}
          </a>
        {% endfor %}
      </div>
    </div>
  </div>
</footer>
