# Site Build Settings

# jekyll-paginate configuration
paginate:            6

# Build settings
markdown:            kramdown
highlighter:         rouge
permalink:           /:title
plugins:
  - jekyll-paginate
  - jekyll-feed
  - jekyll-seo-tag

# Ensure Jekyll includes favicon.ico in the output
include:
  - favicon.ico

# Customise atom feed settings (this is where Jekyll-Feed gets configuration information)
title:               "Birusupi"
description:         "びるすぴの個人サイト。ゲーム、DTM、旅行記、技術メモなど雑多な記録を綴っています。"
author:              "Birusupi"

url: "https://spira-unplugged.github.io"
baseurl: "/birusupi"

# Timezone
timezone: Asia/Tokyo

# Language (for SEO and og:locale)
lang: ja

# Twitter/X account (used by jekyll-seo-tag for twitter:site meta tag)
twitter:
  username: singingsores
  card: summary_large_image

# Point jekyll-feed output to the custom RSS 2.0 feed
feed:
  path: rss-feed.xml

# Default front-matter values (fallback og:image for pages without image)
defaults:
  - scope:
      path: ""
    values:
      image: /assets/img/about.jpg
