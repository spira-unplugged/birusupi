# Site Build Settings

# Build settings
markdown:            kramdown
highlighter:         rouge
permalink:           /:title
plugins:
  - jekyll-paginate-v2
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-archives
  - jekyll-last-modified-at
  - jekyll-minifier

# jekyll-paginate-v2
pagination:
  enabled:      true
  per_page:     6
  permalink:    '/page/:num/'
  sort_field:   'date'
  sort_reverse: true

# jekyll-archives
jekyll-archives:
  enabled:
    - year
    - month
    - tags
  layouts:
    year:  archive-date
    month: archive-date
    tag:   tag
  permalinks:
    year:  '/archive/:year/'
    month: '/archive/:year/:month/'
    tag:   '/tags/:name/'

# jekyll-minifier (JS は複雑な構文があるため無効化)
jekyll-minifier:
  compress_javascript: false
  exclude:
    - 'cacaulay-mulkin.html'

# SCSS ソースマップを無効化 (jekyll-last-modified-at との競合回避)
sass:
  sourcemap: never

# Ensure Jekyll includes favicon.ico in the output
include:
  - favicon.ico
  - favicon.png

# Customise atom feed settings (this is where Jekyll-Feed gets configuration information)
title:               "Birusupi"
description:         "びるすぴの個人サイト。ゲーム、DTM、旅行記、技術メモなど雑多な記録を綴っています。"
author:              "Birusupi"

url: "https://spira-unplugged.github.io"
baseurl: "/birusupi"

# Timezone
timezone: Asia/Tokyo

# Date format used across templates
date_format: "%Y.%m.%d"

# Language (for SEO and og:locale)
lang: ja

# Twitter/X account (used by jekyll-seo-tag for twitter:site meta tag)
twitter:
  username: singingsores
  card: summary_large_image

# jekyll-feed generates Atom feed at /feed.xml (default)

# Default front-matter values (fallback og:image for pages without image)
defaults:
  - scope:
      path: ""
    values:
      image: /assets/img/about.jpg
