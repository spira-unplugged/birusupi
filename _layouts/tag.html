---
layout: default
---

<div class="page-content category-content">
  <header class="page-hero page-hero-category">
    <p class="page-kicker">Tag</p>
    <h1>{{ page.title }}</h1>
    <p class="page-subtitle">{{ page.posts | size }} 件の記事</p>
  </header>

  <section class="category-grid">
    {% assign tag_posts = page.posts | sort: 'date' | reverse %}
    {% for post in tag_posts %}
      {% include category-card.html post=post %}
    {% endfor %}
  </section>
</div>
